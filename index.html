<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>E-com Dimensioner v18</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #video_container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .dashboard { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); padding: 25px 0; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        #result { font-size: 28px; font-weight: bold; color: #00ff00; margin-bottom: 10px; }
        .instructions { font-size: 14px; color: #ffeb3b; margin-bottom: 15px; text-align: center; padding: 0 20px; }
        button { background: #00ff00; color: #000; border: none; padding: 18px 40px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }
        #loader { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="loader">
        <h2 id="load-text">Initializing AI...</h2>
        <button id="start-btn" style="display:none;" onclick="startApp()">Start Measuring</button>
    </div>

    <div id="video_container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div id="tap-hint" style="position:fixed; top:20px; width:100%; text-align:center; color:#fff; z-index:5;">
        Place a Credit Card next to the box
    </div>

    <div class="dashboard">
        <div class="instructions">Point at Box + Credit Card</div>
        <div id="result">0.0 x 0.0 cm</div>
        <button onclick="location.reload()">Reset Scan</button>
    </div>

    <script type="module">
        import { ObjectDetector, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById("webcam");
        const canvas = document.getElementById("output_canvas");
        const ctx = canvas.getContext("2d");
        const resultDiv = document.getElementById("result");
        const startBtn = document.getElementById("start-btn");
        const loadText = document.getElementById("load-text");

        let objectDetector;
        const CARD_REAL_WIDTH = 8.56; // Standard Credit Card in cm

        // Initialize Detector
        const init = async () => {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            objectDetector = await ObjectDetector.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite",
                    delegate: "GPU"
                },
                scoreThreshold: 0.3,
                runningMode: "VIDEO"
            });
            loadText.innerText = "System Ready";
            startBtn.style.display = "block";
        };

        window.startApp = () => {
            document.getElementById("loader").style.display = "none";
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", predict);
            });
        };

        async function predict() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            const detections = await objectDetector.detectForVideo(video, performance.now());
            drawDetections(detections.detections);
            window.requestAnimationFrame(predict);
        }

        function drawDetections(detections) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let cardPixels = null;
            let boxes = [];

            detections.forEach(det => {
                const label = det.categories[0].categoryName;
                const score = det.categories[0].score;
                const { originX, originY, width, height } = det.boundingBox;

                // MediaPipe general model usually labels cards/small rects as 'cell phone' or 'book'
                // We look for any small rectangular detection to act as the card
                if (width < canvas.width * 0.4 && width > canvas.width * 0.1) {
                    cardPixels = width;
                    drawBox(originX, originY, width, height, "REF CARD", "#fbff00");
                } else {
                    boxes.push({ w: width, h: height, x: originX, y: originY });
                    drawBox(originX, originY, width, height, "PACKAGE", "#00ff00");
                }
            });

            if (cardPixels && boxes.length > 0) {
                const pxToCm = CARD_REAL_WIDTH / cardPixels;
                const L = (boxes[0].w * pxToCm).toFixed(1);
                const W = (boxes[0].h * pxToCm).toFixed(1);
                resultDiv.innerText = `${L} x ${W} cm`;
            }
        }

        function drawBox(x, y, w, h, label, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = color;
            ctx.fillText(label, x, y - 10);
        }

        init();
    </script>
</body>
</html>
