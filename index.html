<!DOCTYPE html>
<html>
<head>
    <title>AI Box Measurer Prototype</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        .dashboard {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 80%; background: rgba(0,0,0,0.8); color: white;
            padding: 15px; border-radius: 10px; font-family: sans-serif; z-index: 1000;
        }
        .btn { background: #2196F3; border: none; color: white; padding: 10px; width: 100%; border-radius: 5px; margin-top: 10px;}
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div class="dashboard">
        <div id="stats">Dimensions: 0.00m x 0.00m</div>
        <button class="btn" onclick="addMarker()">Set Corner</button>
        <button class="btn" style="background: #f44336;" onclick="reset()">Reset</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-entity cursor="fuse: false; rayOrigin: mouse;"></a-entity>
        <a-camera gps-camera rotation-reader>
            <a-ring color="red" radius-inner="0.02" radius-outer="0.03" position="0 0 -1"></a-ring>
        </a-camera>
        
        <a-entity id="marker-container"></a-entity>
    </a-scene>

    <script>
        let markers = [];
        
        function addMarker() {
            const scene = document.querySelector('#marker-container');
            const camera = document.querySelector('a-camera');
            
            // Get current camera position as a proxy for the object point
            const pos = camera.object3D.position;
            
            const newMarker = document.createElement('a-sphere');
            newMarker.setAttribute('position', `${pos.x} ${pos.y} ${pos.z - 2}`); // Placing 2m in front
            newMarker.setAttribute('radius', '0.05');
            newMarker.setAttribute('color', 'yellow');
            scene.appendChild(newMarker);
            
            markers.push({x: pos.x, y: pos.y, z: pos.z - 2});
            calculateDistances();
        }

        function calculateDistances() {
            if (markers.length >= 2) {
                const p1 = markers[markers.length - 2];
                const p2 = markers[markers.length - 1];
                const dist = Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2) + Math.pow(p2.z - p1.z, 2));
                document.getElementById('stats').innerText = `Last Segment: ${dist.toFixed(2)} meters`;
            }
        }

        function reset() {
            markers = [];
            document.querySelector('#marker-container').innerHTML = '';
            document.getElementById('stats').innerText = "Dimensions: 0.00m";
        }
    </script>
</body>
</html>
