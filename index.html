<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>AI Volumetric Ultimate v12</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/objectron"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #canvas_output { width: 100vw; height: 100vh; object-fit: cover; }
        
        /* UI Elements */
        .top-bar { position: fixed; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; box-sizing: border-box; z-index: 100; }
        .ui-bottom { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 20px 0; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 100; }
        #dims { font-size: 22px; font-weight: bold; color: #00ff00; }
        #vol { font-size: 14px; color: #00e5ff; }

        /* Buttons */
        .btn-row { display: flex; gap: 8px; width: 90%; }
        button { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-main { background: #00ff00; color: #000; }
        .btn-sec { background: #222; color: #fff; border: 1px solid #444; }

        /* History & Loading */
        #history-panel { position: fixed; top: 100%; left: 0; width: 100%; height: 75%; background: #111; z-index: 200; transition: 0.4s; padding: 20px; box-sizing: border-box; overflow-y: auto; border-radius: 20px 20px 0 0; }
        #history-panel.open { top: 25%; }
        .history-item { background: #1a1a1a; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #00ff00; }
        #loader { position: fixed; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <div id="loader">
        <button class="btn-main" onclick="startApp()" style="width:200px">Start Camera</button>
        <p id="load-status" style="margin-top:15px; font-size:12px; color:#666;">Ready</p>
    </div>

    <video id="input_video" style="display:none;" playsinline muted></video>
    <canvas id="canvas_output"></canvas>

    <div class="top-bar">
        <button class="btn-sec" style="width:auto;" onclick="toggleHistory()">📜 History</button>
        <button class="btn-sec" style="width:auto;" onclick="switchCamera()">🔄 Flip</button>
    </div>

    <div class="ui-bottom">
        <div id="dims">Point at Box</div>
        <div id="vol">Volume: --</div>
        <div class="btn-row">
            <button class="btn-sec" onclick="calibrate()">📏 Calib</button>
            <button class="btn-main" id="actionBtn" onclick="handleCapture()">📸 Capture & Save</button>
        </div>
    </div>

    <div id="history-panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>History</h2>
            <button onclick="clearHistory()" style="background:#ff4444; color:#fff; padding:8px; border-radius:8px;">Clear All</button>
        </div>
        <div id="history-list"></div>
        <button class="btn-sec" style="width:100%; margin-top:20px;" onclick="toggleHistory()">Close</button>
    </div>

    <script type="module">
        const video = document.getElementById('input_video');
        const canvas = document.getElementById('canvas_output');
        const ctx = canvas.getContext('2d');
        const dimDiv = document.getElementById('dims');
        const volDiv = document.getElementById('vol');
        const actionBtn = document.getElementById('actionBtn');

        let cameraObj = null;
        let isCaptured = false;
        let currentFacing = 'environment';
        let scaleFactor = 100;
        let history = JSON.parse(localStorage.getItem('box_history_v12') || '[]');

        const objectron = new Objectron({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/objectron/${file}`
        });

        objectron.setOptions({ modelName: 'Box', maxNumObjects: 1, staticImageMode: true });

        objectron.onResults((results) => {
            document.getElementById('loader').style.display = "none";
            if (results.detectedObjects.length > 0) {
                const obj = results.detectedObjects[0];
                const l = (obj.scale[0] * scaleFactor).toFixed(1);
                const w = (obj.scale[1] * scaleFactor).toFixed(1);
                const h = (obj.scale[2] * scaleFactor).toFixed(1);
                const volume = (l * w * h).toFixed(0);

                dimDiv.innerText = `${l}x${w}x${h} cm`;
                volDiv.innerText = `Vol: ${volume} cm³`;
                
                saveToHistory(dimDiv.innerText, volDiv.innerText, canvas.toDataURL());
            } else {
                dimDiv.innerText = "AI Failed. Try manually.";
            }
        });

        window.startApp = async () => {
            document.getElementById('load-status').innerText = "Waking up camera...";
            startCamera(currentFacing);
            setTimeout(() => { document.getElementById('loader').style.display = "none"; }, 1500);
        };

        async function startCamera(mode) {
            if (cameraObj) await cameraObj.stop();
            cameraObj = new Camera(video, {
                onFrame: async () => {
                    if (!isCaptured) {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    }
                },
                facingMode: mode, width: 640, height: 480
            });
            cameraObj.start();
        }

        window.handleCapture = async () => {
            if (!isCaptured) {
                isCaptured = true;
                actionBtn.innerText = "♻️ New Scan";
                actionBtn.style.background = "#333";
                actionBtn.style.color = "#fff";
                document.getElementById('loader').style.display = "flex";
                document.getElementById('load-status').innerText = "AI Computing...";
                await objectron.send({image: video});
                if (cameraObj) await cameraObj.stop();
            } else {
                isCaptured = false;
                actionBtn.innerText = "📸 Capture & Save";
                actionBtn.style.background = "#00ff00";
                actionBtn.style.color = "#000";
                startCamera(currentFacing);
            }
        };

        window.switchCamera = () => {
            currentFacing = (currentFacing === 'environment') ? 'user' : 'environment';
            if(!isCaptured) startCamera(currentFacing);
        };

        window.toggleHistory = () => {
            document.getElementById('history-panel').classList.toggle('open');
            renderHistory();
        };

        function saveToHistory(d, v, img) {
            history.unshift({ date: new Date().toLocaleString(), dims: d, vol: v, img: img });
            localStorage.setItem('box_history_v12', JSON.stringify(history.slice(0, 10)));
        }

        window.downloadImg = (index) => {
            const link = document.createElement('a');
            link.download = `measure.png`;
            link.href = history[index].img;
            link.click();
        };

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = history.map((h, i) => `
                <div class="history-item">
                    <small>${h.date}</small><br><strong>${h.dims}</strong><br>
                    <small style="color:#00e5ff">${h.vol}</small><br>
                    <span onclick="downloadImg(${i})" style="color:#00ff00; font-size:12px; text-decoration:underline;">Download Image</span>
                </div>
            `).join('') || "No scans yet.";
        }

        window.calibrate = () => { let v = prompt("Scale:", scaleFactor); if(v) scaleFactor = parseFloat(v); };
        window.clearHistory = () => { history = []; localStorage.removeItem('box_history_v12'); renderHistory(); };
    </script>
</body>
</html>
