<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>AI Scanner v11 - Android Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/objectron"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #canvas_output { width: 100vw; height: 100vh; object-fit: cover; background: #111; }
        .ui { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 25px 0; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 100; }
        #dims { font-size: 22px; font-weight: bold; color: #00ff00; }
        button { padding: 15px 25px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-main { background: #00ff00; color: #000; width: 80%; }
        #loading-overlay { position: fixed; top: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <button id="initBtn" class="btn-main" onclick="initializeAndroidCamera()">Click to Start Camera</button>
        <div id="status-msg" style="display:none; color:#00ff00;">Waking up Camera...</div>
    </div>

    <video id="input_video" style="display:none;" playsinline muted></video>
    <canvas id="canvas_output"></canvas>

    <div class="ui">
        <div id="dims">Scanning Ready</div>
        <button class="btn-main" id="actionBtn" onclick="handleAction()">📸 Capture & Measure</button>
    </div>

    <script type="module">
        const video = document.getElementById('input_video');
        const canvas = document.getElementById('canvas_output');
        const ctx = canvas.getContext('2d');
        const dimDiv = document.getElementById('dims');
        const overlay = document.getElementById('loading-overlay');
        const statusMsg = document.getElementById('status-msg');
        const initBtn = document.getElementById('initBtn');

        let isCaptured = false;
        let cameraObj = null;

        const objectron = new Objectron({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/objectron/${file}`
        });
        objectron.setOptions({ modelName: 'Box', maxNumObjects: 1, staticImageMode: true });

        objectron.onResults((results) => {
            if (results.detectedObjects.length > 0) {
                const obj = results.detectedObjects[0];
                const l = (obj.scale[0] * 100).toFixed(1);
                const w = (obj.scale[1] * 100).toFixed(1);
                const h = (obj.scale[2] * 100).toFixed(1);
                dimDiv.innerText = `${l} x ${w} x ${h} cm`;
            } else {
                dimDiv.innerText = "No box found. Try different angle.";
            }
        });

        // FIXED: Android Startup Sequence
        window.initializeAndroidCamera = async () => {
            initBtn.style.display = "none";
            statusMsg.style.display = "block";

            try {
                // 1. Force clear any existing streams
                if (window.stream) {
                    window.stream.getTracks().forEach(track => track.stop());
                }

                // 2. Delay for Android hardware warm-up
                await new Promise(r => setTimeout(r, 1000));

                cameraObj = new Camera(video, {
                    onFrame: async () => {
                        if (!isCaptured) {
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        }
                    },
                    facingMode: 'environment',
                    width: 640, height: 480
                });

                await cameraObj.start();
                
                // 3. Final handshake delay
                setTimeout(() => {
                    overlay.style.display = "none";
                }, 800);

            } catch (err) {
                alert("Android Camera Blocked: Please check Chrome settings.");
                console.error(err);
            }
        };

        window.handleAction = async () => {
            if (!isCaptured) {
                isCaptured = true;
                dimDiv.innerText = "AI Processing...";
                await objectron.send({image: video});
                if (cameraObj) await cameraObj.stop();
                document.getElementById('actionBtn').innerText = "♻️ New Scan";
            } else {
                location.reload(); 
            }
        };
    </script>
</body>
</html>
