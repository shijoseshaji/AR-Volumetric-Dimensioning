<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>AI Static Scanner v7</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/objectron"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #canvas_output { width: 100vw; height: 100vh; object-fit: cover; }
        .ui { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 25px 0; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 100; }
        #dims { font-size: 24px; font-weight: bold; color: #00ff00; height: 30px; }
        .btn-row { display: flex; gap: 10px; width: 90%; }
        button { flex: 1; padding: 18px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-main { background: #00ff00; color: #000; }
        .btn-sec { background: #333; color: #fff; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 500; }
    </style>
</head>
<body>
    <div id="loading-overlay">AI Computing...</div>
    <video id="input_video" style="display:none;" playsinline></video>
    <canvas id="canvas_output"></canvas>

    <div class="ui">
        <div id="dims">Point & Capture</div>
        <div class="btn-row">
            <button class="btn-sec" onclick="location.reload()">🔄 Reset</button>
            <button class="btn-main" id="capBtn" onclick="runAIOnDemand()">📸 Capture & Measure</button>
        </div>
    </div>

    <script type="module">
        const video = document.getElementById('input_video');
        const canvas = document.getElementById('canvas_output');
        const ctx = canvas.getContext('2d');
        const dimDiv = document.getElementById('dims');
        const loader = document.getElementById('loading-overlay');

        let cameraObj = null;
        let scaleFactor = 100;

        // Initialize AI but DON'T start it yet
        const objectron = new Objectron({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/objectron/${file}`
        });

        objectron.setOptions({
            modelName: 'Box',
            maxNumObjects: 1,
            staticImageMode: true // THIS IS THE KEY: Runs once on a static frame
        });

        objectron.onResults((results) => {
            loader.style.display = "none";
            if (results.detectedObjects.length > 0) {
                const obj = results.detectedObjects[0];
                // Draw the box only once
                const l = (obj.scale[0] * scaleFactor).toFixed(1);
                const w = (obj.scale[1] * scaleFactor).toFixed(1);
                const h = (obj.scale[2] * scaleFactor).toFixed(1);
                dimDiv.innerText = `${l} x ${w} x ${h} cm`;
                
                // Keep the last captured frame visible with the box on top
                ctx.strokeStyle = "#00ff00";
                ctx.lineWidth = 5;
                // Simple visual confirmation
                ctx.strokeRect(canvas.width/4, canvas.height/4, canvas.width/2, canvas.height/2);
            } else {
                dimDiv.innerText = "Box not found. Try again.";
            }
        });

        async function startStreaming() {
            cameraObj = new Camera(video, {
                onFrame: async () => {
                    // Only draw video to canvas, NO AI processing here
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                },
                facingMode: 'environment',
                width: 640, height: 480
            });
            cameraObj.start();
        }

        window.runAIOnDemand = async () => {
            loader.style.display = "flex";
            dimDiv.innerText = "Calculating...";
            
            // Send exactly ONE frame to the AI
            await objectron.send({image: video});
            
            // Stop the camera to save battery and freeze the image
            if (cameraObj) await cameraObj.stop();
        };

        startStreaming();
    </script>
</body>
</html>
