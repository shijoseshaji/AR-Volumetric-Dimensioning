<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Dimension Master v16</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/objectron"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }
        #canvas_output { width: 100vw; height: 100vh; object-fit: cover; }
        
        /* Dashboard Styling */
        .ui-bottom { position: fixed; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.95) 20%); padding: 30px 0; display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 100; }
        
        .dim-container { text-align: center; margin-bottom: 10px; }
        .label { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 2px; }
        #dims { font-size: 32px; font-weight: 800; color: #00ff00; text-shadow: 0 0 10px rgba(0,255,0,0.3); }
        #vol-small { font-size: 14px; color: #444; } /* Volume made small/secondary */

        .btn-row { display: flex; gap: 10px; width: 90%; max-width: 400px; }
        button { flex: 1; padding: 18px; border: none; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-main { background: #00ff00; color: #000; }
        .btn-sec { background: #222; color: #fff; border: 1px solid #444; }

        /* Navigation & History */
        .top-bar { position: fixed; top: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 100; }
        #history-panel { position: fixed; top: 100%; left: 0; width: 100%; height: 75%; background: #111; z-index: 200; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px; box-sizing: border-box; overflow-y: auto; border-radius: 25px 25px 0 0; }
        #history-panel.open { top: 25%; }
        .history-item { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid #00ff00; }
        
        #init-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .tap-prompt { position: fixed; top: 100px; width: 100%; text-align: center; color: #fbff00; font-weight: bold; display: none; z-index: 50; }
    </style>
</head>
<body>
    <div id="init-overlay">
        <h1 style="margin-bottom:20px">Box Dimensioner</h1>
        <button class="btn-main" style="width:220px" onclick="launchApp()">START CAMERA</button>
    </div>

    <div id="tap-hint" class="tap-prompt">AI Failed. Tap 8 corners of the box.</div>
    
    <video id="input_video" style="display:none;" playsinline muted></video>
    <canvas id="canvas_output"></canvas>

    <div class="top-bar">
        <button class="btn-sec" style="width:auto; padding:10px 20px;" onclick="toggleHistory()">📜 History</button>
        <button class="btn-sec" style="width:auto; padding:10px 20px;" onclick="switchCamera()">🔄 Flip</button>
    </div>

    <div class="ui-bottom">
        <div class="dim-container">
            <div class="label">Dimensions (L x W x H)</div>
            <div id="dims">0.0 x 0.0 x 0.0 cm</div>
            <div id="vol-small">Vol: --</div>
        </div>
        <div class="btn-row">
            <button class="btn-sec" onclick="calibrate()">📏 Calibrate</button>
            <button class="btn-main" id="actionBtn" onclick="handleWorkflow()">📸 CAPTURE</button>
        </div>
    </div>

    <div id="history-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0">Saved Dimensions</h2>
            <button onclick="clearHistory()" style="background:#ff4444; color:#fff; border:none; padding:8px 15px; border-radius:10px;">Clear</button>
        </div>
        <div id="history-list"></div>
        <button class="btn-sec" style="width:100%; margin-top:20px;" onclick="toggleHistory()">Close</button>
    </div>

    <script type="module">
        const video = document.getElementById('input_video');
        const canvas = document.getElementById('canvas_output');
        const ctx = canvas.getContext('2d');
        const dimDiv = document.getElementById('dims');
        const volDiv = document.getElementById('vol-small');
        const actionBtn = document.getElementById('actionBtn');

        let isCaptured = false, manualPoints = [], currentFacing = 'environment';
        let scaleFactor = 100, history = JSON.parse(localStorage.getItem('box_history_v16') || '[]');
        let cameraObj = null;

        const objectron = new Objectron({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/objectron/${file}` });
        objectron.setOptions({ modelName: 'Box', maxNumObjects: 1, staticImageMode: true });

        objectron.onResults((results) => {
            if (results.detectedObjects.length > 0) {
                const obj = results.detectedObjects[0];
                const l = (obj.scale[0] * scaleFactor).toFixed(1);
                const w = (obj.scale[1] * scaleFactor).toFixed(1);
                const h = (obj.scale[2] * scaleFactor).toFixed(1);
                updateDisplay(l, w, h, "AI");
            } else {
                dimDiv.innerText = "Manual Select Required";
                document.getElementById('tap-hint').style.display = "block";
            }
        });

        window.launchApp = () => { document.getElementById('init-overlay').style.display = 'none'; startCamera(currentFacing); };

        async function startCamera(mode) {
            if (cameraObj) await cameraObj.stop();
            cameraObj = new Camera(video, {
                onFrame: async () => {
                    if (!isCaptured) {
                        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    }
                },
                facingMode: mode, width: 640, height: 480
            });
            cameraObj.start();
        }

        window.handleWorkflow = async () => {
            if (!isCaptured) {
                isCaptured = true;
                actionBtn.innerText = "♻️ RESET";
                actionBtn.style.background = "#333";
                actionBtn.style.color = "#fff";
                await objectron.send({image: video});
                if (cameraObj) await cameraObj.stop();
            } else {
                isCaptured = false; manualPoints = [];
                actionBtn.innerText = "📸 CAPTURE";
                actionBtn.style.background = "#00ff00";
                actionBtn.style.color = "#000";
                document.getElementById('tap-hint').style.display = "none";
                startCamera(currentFacing);
            }
        };

        canvas.addEventListener('click', (e) => {
            if (!isCaptured || manualPoints.length >= 8) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            manualPoints.push({x, y});
            
            ctx.fillStyle = "#00ff00"; ctx.beginPath(); ctx.arc(x, y, 8, 0, 2*Math.PI); ctx.fill();
            dimDiv.innerText = `Point ${manualPoints.length}/8...`;
            
            if (manualPoints.length === 8) {
                const l = (Math.abs(manualPoints[0].x - manualPoints[1].x) / canvas.width * scaleFactor).toFixed(1);
                const w = (Math.abs(manualPoints[1].y - manualPoints[2].y) / canvas.height * scaleFactor).toFixed(1);
                const h = (scaleFactor * 0.25).toFixed(1); // Manual height baseline
                updateDisplay(l, w, h, "Manual");
            }
        });

        function updateDisplay(l, w, h, method) {
            const v = (l * w * h).toFixed(0);
            dimDiv.innerText = `${l} x ${w} x ${h} cm`;
            volDiv.innerText = `Method: ${method} | Vol: ${v} cm³`;
            
            history.unshift({ date: new Date().toLocaleTimeString(), res: dimDiv.innerText, img: canvas.toDataURL() });
            localStorage.setItem('box_history_v16', JSON.stringify(history.slice(0, 10)));
        }

        window.toggleHistory = () => { document.getElementById('history-panel').classList.toggle('open'); renderHistory(); };

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = history.map((h, i) => `
                <div class="history-item">
                    <div style="font-size:11px; color:#666">${h.date}</div>
                    <div style="font-weight:bold; font-size:20px; color:#00ff00">${h.res}</div>
                    <a href="${h.img}" download="dim.png" style="color:#00e5ff; font-size:12px; text-decoration:none;">💾 Save Image</a>
                </div>
            `).join('') || "No scans recorded.";
        }

        window.switchCamera = () => { currentFacing = (currentFacing === 'environment') ? 'user' : 'environment'; startCamera(currentFacing); };
        window.calibrate = () => { let val = prompt("Enter reference scale (Default 100):", scaleFactor); if(val) scaleFactor = parseFloat(val); };
        window.clearHistory = () => { history = []; localStorage.removeItem('box_history_v16'); renderHistory(); };
    </script>
</body>
</html>
