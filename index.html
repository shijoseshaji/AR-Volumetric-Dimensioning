<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>AI Volumetric v14 - Manual Fallback</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/objectron"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #canvas_output { width: 100vw; height: 100vh; object-fit: cover; cursor: crosshair; }
        .ui-bottom { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); padding: 20px 0; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 100; }
        #dims { font-size: 22px; font-weight: bold; color: #00ff00; text-align: center; }
        .btn-row { display: flex; gap: 8px; width: 90%; }
        button { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-main { background: #00ff00; color: #000; }
        .btn-sec { background: #222; color: #fff; border: 1px solid #444; }
        #init-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:2000; display:flex; justify-content:center; align-items:center; }
        .instruction-toast { position: fixed; top: 70px; width: 80%; left: 10%; background: rgba(255,165,0,0.8); padding: 10px; border-radius: 8px; text-align: center; display: none; z-index: 100; font-size: 14px; }
    </style>
</head>
<body>
    <div id="init-overlay"><button class="btn-main" style="width:200px" onclick="firstStart()">START SYSTEM</button></div>
    <div id="toast" class="instruction-toast">Tap the 8 corners of the box</div>
    <video id="input_video" style="display:none;" playsinline muted></video>
    <canvas id="canvas_output"></canvas>

    <div class="ui-bottom">
        <div id="dims">Point at Box</div>
        <div class="btn-row">
            <button class="btn-sec" onclick="toggleManualMode()">🖱️ Manual Select</button>
            <button class="btn-main" id="actionBtn" onclick="handleFlow()">📸 Capture</button>
        </div>
    </div>

    <script type="module">
        const video = document.getElementById('input_video');
        const canvas = document.getElementById('canvas_output');
        const ctx = canvas.getContext('2d');
        const dimDiv = document.getElementById('dims');
        const actionBtn = document.getElementById('actionBtn');
        const toast = document.getElementById('toast');

        let isCaptured = false;
        let manualMode = false;
        let manualPoints = [];
        let scaleFactor = 100;
        let cameraObj = null;

        const objectron = new Objectron({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/objectron/${file}` });
        objectron.setOptions({ modelName: 'Box', maxNumObjects: 1, staticImageMode: true });

        objectron.onResults((results) => {
            if (results.detectedObjects.length > 0) {
                processResults(results.detectedObjects[0].scale);
            } else {
                dimDiv.innerText = "AI Failed. Switch to Manual Mode.";
                toast.style.display = "block";
            }
        });

        function processResults(scale) {
            const l = (scale[0] * scaleFactor).toFixed(1);
            const w = (scale[1] * scaleFactor).toFixed(1);
            const h = (scale[2] * scaleFactor).toFixed(1);
            dimDiv.innerText = `${l} x ${w} x ${h} cm`;
        }

        window.firstStart = () => {
            document.getElementById('init-overlay').style.display = 'none';
            startCamera();
        };

        async function startCamera() {
            cameraObj = new Camera(video, {
                onFrame: async () => {
                    if (!isCaptured) {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    }
                },
                facingMode: 'environment', width: 640, height: 480
            });
            await cameraObj.start();
        }

        window.toggleManualMode = () => {
            manualMode = !manualMode;
            manualPoints = [];
            toast.style.display = manualMode ? "block" : "none";
            dimDiv.innerText = manualMode ? "Tap Corners (0/8)" : "Point at Box";
        };

        canvas.addEventListener('mousedown', (e) => {
            if (!manualMode || !isCaptured) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            
            manualPoints.push({x, y});
            drawPoint(e.clientX - rect.left, e.clientY - rect.top);
            
            dimDiv.innerText = `Points: ${manualPoints.length}/8`;
            if (manualPoints.length === 8) calculateManualDims();
        });

        function drawPoint(x, y) {
            ctx.fillStyle = "#ff0000";
            ctx.beginPath(); ctx.arc(x, y, 5, 0, 2 * Math.PI); ctx.fill();
        }

        function calculateManualDims() {
            // Simplified logic: calculate distance between first 3 points as L, W, H proxies
            // In a full build, this uses 3D reconstruction math
            const dist = (p1, p2) => Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2)) * scaleFactor;
            const l = dist(manualPoints[0], manualPoints[1]).toFixed(1);
            const w = dist(manualPoints[1], manualPoints[2]).toFixed(1);
            const h = dist(manualPoints[2], manualPoints[3]).toFixed(1);
            
            dimDiv.innerText = `${l} x ${w} x ${h} cm (Manual)`;
            manualMode = false;
            toast.style.display = "none";
        }

        window.handleFlow = async () => {
            if (!isCaptured) {
                isCaptured = true;
                actionBtn.innerText = "♻️ Reset";
                if (!manualMode) await objectron.send({image: video});
                if (cameraObj) await cameraObj.stop();
            } else {
                isCaptured = false;
                manualPoints = [];
                actionBtn.innerText = "📸 Capture";
                startCamera();
            }
        };
    </script>
</body>
</html>
