<!DOCTYPE html>
<html>
<head>
    <title>AI Auto-Box Dimensioner</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/objectron"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #canvas_output { width: 100vw; height: 100vh; object-fit: cover; }
        .dashboard {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 255, 0, 0.2); border: 2px solid #00ff00;
            color: #00ff00; padding: 15px; border-radius: 10px;
            text-align: center; width: 80%; backdrop-filter: blur(5px);
        }
        #status { font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>
    <video id="input_video" style="display:none;"></video>
    <canvas id="canvas_output"></canvas>
    
    <div class="dashboard">
        <div id="status">AI LOADING...</div>
        <div id="dimensions">Scanning for box...</div>
    </div>

    <script type="module">
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('canvas_output');
        const canvasCtx = canvasElement.getContext('2d');
        const statusDiv = document.getElementById('status');
        const dimsDiv = document.getElementById('dimensions');

        function onResults(results) {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            
            canvasCtx.save();
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.detectedObjects.length > 0) {
                statusDiv.innerText = "BOX DETECTED ✅";
                const obj = results.detectedObjects[0];
                
                // Drawing the 3D Wireframe
                drawConnectors(canvasCtx, obj.keypoints, BOX_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                
                // Calculating relative dimensions
                // Note: Without a reference object, these are relative units
                const l = (obj.scale[0] * 100).toFixed(1); 
                const w = (obj.scale[1] * 100).toFixed(1);
                const h = (obj.scale[2] * 100).toFixed(1);
                dimsDiv.innerText = `L: ${l}cm | W: ${w}cm | H: ${h}cm`;
            } else {
                statusDiv.innerText = "SCANNING...";
                dimsDiv.innerText = "Place box in center of view";
            }
            canvasCtx.restore();
        }

        const objectron = new Objectron({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/objectron/${file}`
        });

        objectron.setOptions({
            modelName: 'Box',
            maxNumObjects: 1,
        });

        objectron.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await objectron.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        camera.start();
    </script>
</body>
</html>
